<div class="navbar border border-black p-2 w-100 h-25 d-flex justify-content-between align-items-center">
    <button class="flex-1" routerLink="/boards">Boards</button>
    <h2 class="flex-1">SyncBoard</h2>
    @if (authService.user()) {
        <h4>Username : {{authService.user()?.name}}</h4>
        <h4 (click)="handleSignOut()">Sign Out</h4>
    } @else {
        <div class="d-flex gap-3 text-black">
            <h4 routerLink="/signup">Signup</h4>
            <h4 routerLink="/login">Login</h4>
        </div>
    }
</div>
