
<div class="min-vh-100 min-vw-100 d-flex align-items-center justify-content-center">
    <form class="my-4 border border-1 border-black p-4 signUpForm w-25" [formGroup]="signUpForm" (ngSubmit)="handleSubmit()">

        <h2 class="text-center mb-4">Sign Up </h2>

        <div id="div-name">
        <label for="input-name" class="form-label" id="label-email">Full Name</label>
        <input id="input-name" type="text" class="form-control form-input"  formControlName="name" autocomplete="name"/>
        </div>
       
        <div id="div-phone">
        <label for="input-phone" class="form-label" id="label-phone">Phone number</label>
        <input id="input-phone" type="tel" class="form-control"  formControlName="phoneNumber" autocomplete="tel"/>
        </div>

        <div id="div-email">
        <label for="input-email" class="form-label" id="label-email">Email</label>
        <input id="input-email" type="email" class="form-control"  formControlName="email" autocomplete="email"/>
        </div>

        <div id="div-password">
        <label for="input-password" class="form-label" id="label-password">Password</label>
        <input id="input-password" type="password" class="form-control" formControlName="password" autocomplete="new-password"/>
        </div>

        <div id="div-confirm-password">
        <label for="input-confirm-password" class="form-label" id="label-confirm-password">Confirm Password</label>
        <input id="input-confirm-password" type="password" class="form-control" formControlName="confirmPassword" autocomplete="new-password"/>
        </div>
        
        @if (authService.authError()) {
            <p class="text-danger fw-2">{{authService.authError()}}</p>
        }
        <button id="button-login" [disabled]="isLoading() || !signUpForm.valid" type="submit" class="btn btn-secondary mt-2 w-100 rounded-0">Sign Up</button>
    </form>
</div>
